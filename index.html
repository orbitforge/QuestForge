<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="QuestForge — Solo RPG Quest Tracker with XP mechanics" />
  <title>QuestForge</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <h1 class="logo">⚔️ QuestForge</h1>
        <button class="btn btn-outline btn-sm" id="import-quest-btn" style="margin-left:12px;">📥 Import</button>
      </div>
      <div class="header-center" id="daily-xp-display">
        <span class="xp-label">Today's XP</span>
        <span class="xp-value" id="daily-xp-value">0</span>
      </div>
      <div class="header-right" id="momentum-display" style="display:none;">
        <span class="momentum-label">⚡ Momentum</span>
        <span class="momentum-timer" id="momentum-timer">00:00</span>
        <span class="momentum-bonus" id="momentum-bonus">+0%</span>
      </div>
    </header>

    <nav id="tab-nav">
      <button class="tab-btn active" data-tab="quests">Quests</button>
      <button class="tab-btn" data-tab="backlog">Backlog</button>
      <button class="tab-btn" data-tab="legend">Legend Log</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
      <button class="tab-btn" data-tab="export">Export</button>
    </nav>

    <main id="main-content">
      <section id="tab-quests" class="tab-panel active"></section>
      <section id="tab-backlog" class="tab-panel"></section>
      <section id="tab-legend" class="tab-panel"></section>
      <section id="tab-stats" class="tab-panel"></section>
      <section id="tab-export" class="tab-panel"></section>
    </main>

    <!-- Quest Form Modal -->
    <div id="quest-modal" class="modal-overlay" style="display:none;">
      <div class="modal-content" id="quest-form-container"></div>
    </div>

    <!-- Import Quest Modal -->
    <div id="import-modal" class="modal-overlay" style="display:none;">
      <div class="modal-content" id="import-form-container"></div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-modal" class="modal-overlay" style="display:none;">
      <div class="modal-content modal-sm" id="confirm-container"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
